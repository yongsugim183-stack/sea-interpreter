services:
  - type: web
    name: sea-interpreter
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: WHISPER_MODEL
        value: tiny
      - key: WHISPER_THREADS
        value: "2"

  - type: web
    name: sea-chatbot
    runtime: docker
    dockerfilePath: ./Dockerfile.chatbot
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CREDENTIALS_JSON
        sync: false
