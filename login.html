<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 | KPC 동시통역서비스</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .logo { font-size: 48px; text-align: center; margin-bottom: 10px; }
    h1 {
      font-size: 20px; font-weight: 700; text-align: center;
      color: #f1f5f9; margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px; color: #94a3b8; text-align: center; margin-bottom: 32px;
    }
    label { font-size: 13px; font-weight: 600; color: #94a3b8; display: block; margin-bottom: 8px; }
    input {
      width: 100%; padding: 13px 16px;
      background: #273549; border: 1px solid #334155; border-radius: 8px;
      color: #f1f5f9; font-size: 15px; font-family: monospace;
      letter-spacing: 2px; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: #6366f1; }
    input::placeholder { letter-spacing: 0; font-family: sans-serif; color: #475569; }
    .btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover:not(:disabled) { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      margin-top: 14px; padding: 10px 14px;
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; color: #fca5a5; font-size: 13px; display: none;
    }
    .hint {
      margin-top: 20px; font-size: 12px; color: #475569; text-align: center; line-height: 1.8;
    }
    footer {
      margin-top: 32px; font-size: 11px; color: #334155; text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">🌏</div>
    <h1>KPC 동시통역서비스</h1>
    <p class="subtitle">한국생산성본부 · 12개 언어 동시 번역</p>

    <label for="codeInput">초대 코드</label>
    <input id="codeInput" type="password" placeholder="초대 코드를 입력하세요" autocomplete="off" />
    <button class="btn" id="loginBtn" onclick="doLogin()">입장하기</button>
    <div class="error" id="errorMsg"></div>
    <p class="hint">
      초대 코드는 관리자(ysukim@kpc.or.kr)에게<br>문의하시기 바랍니다.
    </p>
  </div>
  <footer>© 한국생산성본부 · 문의: ysukim@kpc.or.kr</footer>

  <script>
    document.getElementById("codeInput").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });

    async function doLogin() {
      const code = document.getElementById("codeInput").value.trim();
      if (!code) return;
      const btn = document.getElementById("loginBtn");
      const err = document.getElementById("errorMsg");
      btn.disabled = true;
      btn.textContent = "확인 중...";
      err.style.display = "none";
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code }),
          credentials: "include",
        });
        if (res.ok) {
          const d = await res.json();
          window.location.href = d.is_admin ? "/admin" : "/";
        } else {
          const d = await res.json().catch(() => ({}));
          err.textContent = d.detail || "로그인 실패";
          err.style.display = "block";
        }
      } catch {
        err.textContent = "서버 연결 오류";
        err.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "입장하기";
      }
    }
  </script>
</body>
</html>
