<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 대시보드 | KPC 동시통역서비스</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a; color: #f1f5f9; min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1e1b4b, #312e81, #1e1b4b);
      padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #334155;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 700; }
    header p { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .logout-btn {
      padding: 7px 16px; background: transparent;
      border: 1px solid #334155; border-radius: 6px;
      color: #94a3b8; font-size: 12px; cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: #1e293b; color: #f1f5f9; }

    .main { max-width: 1100px; margin: 28px auto; padding: 0 20px; }

    /* 요약 카드 */
    .summary-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 18px 20px;
    }
    .summary-card .label { font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    .summary-card .value { font-size: 28px; font-weight: 700; color: #f1f5f9; }
    .summary-card .value.green { color: #10b981; }
    .summary-card .value.purple { color: #a855f7; }
    .summary-card .sub { font-size: 11px; color: #64748b; margin-top: 4px; }

    /* 접속자 현황 */
    .section-title {
      font-size: 14px; font-weight: 700; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    /* 테이블 */
    .table-wrap {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      overflow: hidden; margin-bottom: 24px;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #273549; }
    thead th {
      padding: 12px 16px; text-align: left;
      font-size: 12px; font-weight: 600; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    tbody tr { border-top: 1px solid #1e293b; transition: background 0.15s; }
    tbody tr:hover { background: #273549; }
    tbody td { padding: 13px 16px; font-size: 13px; }

    .badge-online {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(16,185,129,0.15); color: #10b981;
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-offline {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(100,116,139,0.15); color: #64748b;
      padding: 3px 10px; border-radius: 20px; font-size: 11px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge-online .dot { animation: blink 1.5s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }

    .num { font-weight: 600; color: #a5b4fc; }
    .code-chip {
      font-family: monospace; font-size: 11px;
      background: #273549; padding: 2px 8px; border-radius: 4px; color: #94a3b8;
    }

    /* 새로고침 */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .refresh-btn {
      padding: 6px 14px; background: #273549;
      border: 1px solid #334155; border-radius: 6px;
      color: #94a3b8; font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .refresh-btn:hover { background: #334155; color: #f1f5f9; }
    .last-updated { font-size: 11px; color: #475569; }

    .empty { text-align: center; padding: 32px; color: #475569; font-size: 13px; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span style="font-size:28px">🌏</span>
    <div>
      <h1>관리자 대시보드</h1>
      <p>KPC 동시통역서비스 · 사용량 현황</p>
    </div>
  </div>
  <button class="logout-btn" onclick="doLogout()">🚪 로그아웃</button>
</header>

<div class="main">

  <!-- 요약 -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="label">현재 접속자</div>
      <div class="value green" id="sumActive">-</div>
      <div class="sub" id="sumMax">/ - 명 제한</div>
    </div>
    <div class="summary-card">
      <div class="label">총 번역 횟수</div>
      <div class="value purple" id="sumTrans">-</div>
      <div class="sub">누적</div>
    </div>
    <div class="summary-card">
      <div class="label">총 번역 글자</div>
      <div class="value" id="sumChars">-</div>
      <div class="sub">누적</div>
    </div>
    <div class="summary-card">
      <div class="label">총 사용 시간</div>
      <div class="value" id="sumTime">-</div>
      <div class="sub">누적 (분)</div>
    </div>
  </div>

  <!-- 사용자 테이블 -->
  <div class="toolbar">
    <div class="section-title">사용자별 사용량</div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="last-updated" id="lastUpdated"></span>
      <button class="refresh-btn" onclick="loadStats()">🔄 새로고침</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>상태</th>
          <th>이름</th>
          <th>초대코드</th>
          <th>번역 횟수</th>
          <th>번역 글자</th>
          <th>누적 시간</th>
          <th>마지막 접속</th>
        </tr>
      </thead>
      <tbody id="statsBody">
        <tr><td colspan="7" class="empty">데이터 로딩 중...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
async function loadStats() {
  try {
    const res = await fetch("/api/admin/stats", { credentials: "include" });
    if (res.status === 401 || res.status === 403) {
      window.location.href = "/";
      return;
    }
    const d = await res.json();

    document.getElementById("sumActive").textContent = d.active_count;
    document.getElementById("sumMax").textContent = `/ ${d.max_concurrent}명 제한`;

    const totalTrans = d.stats.reduce((a, s) => a + s.trans_count, 0);
    const totalChars = d.stats.reduce((a, s) => a + s.char_count, 0);
    const totalMin   = d.stats.reduce((a, s) => a + s.total_min, 0);
    document.getElementById("sumTrans").textContent = totalTrans.toLocaleString();
    document.getElementById("sumChars").textContent = totalChars.toLocaleString();
    document.getElementById("sumTime").textContent  = totalMin.toFixed(1);

    const tbody = document.getElementById("statsBody");
    if (!d.stats.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">사용 기록이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = d.stats.map(s => `
      <tr>
        <td>
          ${s.online
            ? '<span class="badge-online"><span class="dot"></span>접속중</span>'
            : '<span class="badge-offline"><span class="dot"></span>오프라인</span>'}
        </td>
        <td><strong>${s.name}</strong></td>
        <td><span class="code-chip">${s.code}</span></td>
        <td class="num">${s.trans_count.toLocaleString()}회</td>
        <td class="num">${s.char_count.toLocaleString()}자</td>
        <td class="num">${s.total_min}분</td>
        <td style="color:#64748b;font-size:12px">${s.last_access}</td>
      </tr>
    `).join("");

    document.getElementById("lastUpdated").textContent =
      "업데이트: " + new Date().toLocaleTimeString("ko-KR");
  } catch {
    document.getElementById("statsBody").innerHTML =
      '<tr><td colspan="7" class="empty">데이터 로드 실패</td></tr>';
  }
}

async function doLogout() {
  await fetch("/api/logout", { method: "POST", credentials: "include" });
  window.location.href = "/";
}

loadStats();
setInterval(loadStats, 30000); // 30초마다 자동 갱신
</script>
</body>
</html>
